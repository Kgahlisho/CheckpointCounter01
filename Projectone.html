<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title> Counter </title>
    <link rel="stylesheet" href="Projecttone.css">

<!---Create a increment with the id="inctrement-btn"-->

<!--Create a save button ,
set the if to save-btn and 
call the save() function when its clicked-->



<body>

    <div class="container">
        <h1>People entered : </h1>
        <h2 id="count-el"> 0 </h2>

        <div class="button-group">
            <button id="increment-btn" onclick=" increment() "> Add </button>
            <button id="save-btn" onclick=" save() "> Save </button>
        </div>


        <div id="save-el">
            <span class="entry-label"> Previous entries: </span>
            <span id="entries-display"> -> </span>
        </div>


        <div id="total-el">
            <span class="entry-label"> Total people : </span>
            <span id="entries-display"> -> </span>
        </div>
    </div>


    <script src="Projecttone.js"></script>

</body>

</html>
